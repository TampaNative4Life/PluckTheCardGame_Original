    .practiceButtons {

      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-start;
    }

    .practiceQuotaGrid {

      padding: 12px;

      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-start;
    }

    .hint,
    .pmeta,
    .turnBanner,
    .msg {

      line-height: 1.55;
    }

    .quotaPill {

      background: rgba(255,255,255,.03);
      padding: 10px;
      text-align: center;
    }

    .quotaName {
      display: block;
      color: #c4cfdf;
      font-size: .9rem;
      margin-bottom: 4px;
    }

    .quotaVal {
      font-size: 1.25rem;
      font-weight: 800;
    }
