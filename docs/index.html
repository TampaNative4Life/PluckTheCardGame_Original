<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pluck The Card Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #0b1225, #000);
    color: white;
    text-align: center;
}

/* TOP BAR */

.topbar {
    background: black;
    padding: 10px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.brand {
    display: flex;
    align-items: center;
    gap: 10px;
}

.brand img {
    width: 50px;
}

.nav a {
    color: gold;
    margin-left: 18px;
    text-decoration: none;
    font-weight: bold;
}

/* HERO */

.hero {
    padding: 20px 20px 10px;
}

/* LOGO */

.hero img {
    width: 200px;
    margin-bottom: 10px;
}

/* BUTTON FIRST MENTALITY */

.play-btn {
    display: inline-block;
    margin: 10px 0 20px;
    padding: 22px 60px;
    font-size: 32px;
    font-weight: bold;
    background: gold;
    color: black;
    border-radius: 12px;
    text-decoration: none;
    box-shadow: 0 0 20px rgba(255,215,0,0.6);
}

/* HEADLINE (REDUCED) */

.hero h1 {
    font-size: 34px;
    margin: 10px 0;
}

/* SUPPORT TEXT */

.hero p {
    max-width: 700px;
    margin: 10px auto;
    font-size: 16px;
    color: #ccc;
}

/* CARDS */

.section {
    margin-top: 40px;
}

.card {
    background: #111;
    padding: 20px;
    margin: 10px auto;
    max-width: 300px;
    border-radius: 10px;
}

</style>
</head>

<body>

<div class="topbar">
    <div class="brand">
        <img src="images/logo.png">
        <div>PLUCK</div>
    </div>

    <div class="nav">
        <a href="index.html">Home</a>
        <a href="demo2.html">Practice</a>
        <a href="game.html">Arena</a>
        <a href="rules.html">Rules</a>
    </div>
</div>

<div class="hero">

    <img src="images/logo.png">

    <a href="demo2.html" class="play-btn">♠ PLAY NOW ♠</a>

    <h1>Win Tricks. Take Cards. Control the Table.</h1>

    <p>
        A three-player card game built on pressure, consequences, and table feel.
    </p>

    <p>
        Miss your number and somebody gets stronger off your cards.
    </p>

</div>

<div class="section">
    <div class="card">Learn the Game</div>
    <div class="card">View Rules</div>
    <div class="card">About Pluck</div>
</div>

</body>
</html>
