<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pluck The Card Game</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #000;
            color: #fff;
            text-align: center;
        }

        .hero {
            padding: 40px 20px;
        }

        .logo {
            width: 220px;
            margin-bottom: 20px;
        }

        .tagline {
            font-size: 22px;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .play-btn {
            display: inline-block;
            padding: 18px 40px;
            font-size: 28px;
            font-weight: bold;
            color: #000;
            background: linear-gradient(180deg, #ffd700, #b8860b);
            border-radius: 12px;
            text-decoration: none;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
            transition: transform 0.1s ease;
        }

        .play-btn:hover {
            transform: scale(1.05);
        }

        .subtext {
            margin-top: 15px;
            font-size: 14px;
            color: #ccc;
        }

        .section {
            margin-top: 60px;
            padding: 20px;
        }

        .card {
            background: #111;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 20px;
            margin: 15px auto;
            max-width: 300px;
        }

        .card h3 {
            margin-bottom: 10px;
        }

        a.secondary {
            color: #ffd700;
            text-decoration: none;
            font-weight: bold;
        }

    </style>
</head>

<body>

    <div class="hero">
        <img src="logo.png" alt="Pluck Logo" class="logo">

        <div class="tagline">
            Win tricks. Take cards. Control the table.
        </div>

        <a href="demo2.html" class="play-btn">
            ♠ PLAY NOW ♠
        </a>

        <div class="subtext">
            Learn in 60 seconds while you play
        </div>
    </div>

    <div class="section">
        <div class="card">
            <h3>Learn the Game</h3>
            <p>Quick start guide to get you playing fast.</p>
            <a href="learn-pluck.html" class="secondary">Learn More</a>
        </div>

        <div class="card">
            <h3>View Rules</h3>
            <p>Full rules and deeper strategy.</p>
            <a href="rules.html" class="secondary">View Rules</a>
        </div>

        <div class="card">
            <h3>About Pluck</h3>
            <p>The story behind the game.</p>
            <a href="about.html" class="secondary">Learn More</a>
        </div>
    </div>

</body>
</html>
