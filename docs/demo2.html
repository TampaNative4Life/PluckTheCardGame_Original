<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pluck Demo 2</title>

  <link rel="stylesheet" href="css/style.css" />
</head>

<body class="demo2">

  <!-- TOP NAV / HEADER -->
  <div class="nav">
    <div class="navLeft">
      <a class="brand" href="index.html">
        <img src="assets/PluckTheCardGame_Logo.jpg" alt="Pluck Logo">
        <span>PLUCK</span>
      </a>
    </div>

    <div class="navlinks">
      <a href="index.html">Home</a>
      <a href="rules.html">Rules</a>
      <a href="learn-pluck.html">Learn</a>
      <a href="demo2.html" class="activeLink">Play Demo</a>
    </div>
  </div>

  <div class="container">

    <!-- STATUS BAR -->
    <div class="statusBar">
      <div class="statusItem">
        <span class="statusLabel">Phase</span>
        <span id="phaseVal" class="statusValue">PICK</span>
      </div>

      <div class="statusDivider"></div>

      <div class="statusItem">
        <span class="statusLabel">Dealer</span>
        <span id="dealerVal" class="statusValue">(not set)</span>
      </div>

      <div class="statusDivider"></div>

      <div class="statusItem">
        <span class="statusLabel">Trump</span>
        <span id="trumpLabel" class="statusValue">(not set)</span>
      </div>

      <div class="statusDivider"></div>

      <div class="statusItem">
        <span class="statusLabel">Trick</span>
        <span class="statusValue">
          <span id="trickNum">0</span> / <span id="trickMax">17</span>
        </span>
      </div>

      <div class="statusDivider"></div>

      <div class="statusItem">
        <span class="statusLabel">Books</span>
        <span id="booksSummary" class="statusValue">YOU 0 • AI2 0 • AI3 0</span>
      </div>
    </div>

    <!-- TABLE -->
    <div class="tableStage">
      <div class="feltTable">

        <!-- AI LEFT -->
        <div class="seat seat-left">
          <div class="avatarWrap">
            <div class="avatar"></div>
            <div>
              <div class="seatName">AI2</div>
              <div class="seatSub">
                Q: <span id="ai2Quota">7</span> • T: <span id="ai2Tricks">0</span>
              </div>
            </div>
          </div>

          <div id="ai2Hand"></div>
        </div>

        <!-- AI RIGHT -->
        <div class="seat seat-right">
          <div class="avatarWrap">
            <div class="avatar"></div>
            <div>
              <div class="seatName">AI3</div>
              <div class="seatSub">
                Q: <span id="ai3Quota">6</span> • T: <span id="ai3Tricks">0</span>
              </div>
            </div>
          </div>

          <div id="ai3Hand"></div>
        </div>

        <!-- TRICK CENTER -->
        <div class="trickCenter">
          <div class="trickInner">
            <div class="trickTitle">Table</div>
            <div id="trickSlots" class="trickSlots"></div>
          </div>
        </div>

        <!-- YOU -->
        <div class="seat seat-bottom">
          <div class="avatarWrap">
            <div class="avatar avatar-you"></div>
            <div>
              <div class="seatName">YOU</div>
              <div class="seatSub">
                Q: <span id="youQuota">4</span> • T: <span id="youTricks">0</span>
              </div>
            </div>
          </div>

          <div class="youDock">
            <div id="youHand" class="yourHandRow tight"></div>
          </div>
        </div>

      </div>
    </div>

    <!-- MESSAGE -->
    <div id="msg" class="msg"></div>

    <!-- PICK PANEL -->
    <div id="pickPanel" class="overlayCard bottomPanel">
      <div class="overlayTitle">Pick for Dealer</div>

      <div class="overlayButtons">
        <button id="pickBtn" class="btn">Pick</button>
        <button id="pickOkBtn" class="btn">OK</button>
        <button id="pickReBtn" class="btn btn-secondary">Re-Pick</button>
      </div>

      <div id="pickStatus" class="overlayStatus"></div>

      <div class="pickRow">
        <div class="pickSlot">
          <div class="pickName">AI2</div>
          <div id="pickAI2"></div>
        </div>

        <div class="pickSlot">
          <div class="pickName">AI3</div>
          <div id="pickAI3"></div>
        </div>

        <div class="pickSlot">
          <div class="pickName">YOU</div>
          <div id="pickYOU"></div>
        </div>
      </div>
    </div>

    <!-- TRUMP PANEL -->
    <div id="trumpPanel" class="overlayCard bottomPanel" style="display:none;">
      <div class="overlayTitle">Choose Trump</div>
      <div id="trumpStatus" class="overlayStatus"></div>

      <div class="overlayButtons">
        <button class="btn" data-trump="S">Spades</button>
        <button class="btn" data-trump="H">Hearts</button>
        <button class="btn" data-trump="D">Diamonds</button>
        <button class="btn" data-trump="C">Clubs</button>
      </div>
    </div>

    <!-- PLUCK PANEL -->
    <div id="pluckPanel" class="overlayCard bottomPanel" style="display:none;">
      <div class="overlayTitle">Pluck</div>
      <div id="pluckStatus" class="overlayStatus"></div>

      <div id="pluckChoices" class="overlayButtons"></div>
      <button id="pluckNextBtn" class="btn">Next</button>
    </div>

  </div>

  <!-- GAME OVER MODAL -->
  <div id="gameOverModal" class="gameOverModal" style="display:none;">
    <div class="gameOverCard">

      <div class="gameOverTitle">GAME OVER</div>
      <div class="gameOverSub" id="gameOverThreshold"></div>

      <div id="gameOverBody" class="gameOverBody"></div>

      <div id="gameOverFooter" class="gameOverFooter"></div>

      <button id="newGameBtn" class="btn">Start New Game</button>

    </div>
  </div>

  <!-- SCRIPT -->
  <script src="js/demo2.js"></script>

</body>
</html>
