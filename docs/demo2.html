<!-- =========================================
FILE: docs/demo2.html
CHANGE DATE: 2026-04-23

ISSUE:
Game crashing with:
Missing required DOM ids:

pluckEventGive, pluckEventTake, pluckEventImpact, undoLastCardBtn

ROOT CAUSE:

FIX:

UNTOUCHED:

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pluck Demo 2</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- ================= HEADER ================= -->
<header class="site-header">
  <div class="logo-wrap">
    <img src="images/logo.png" alt="Pluck Logo" class="logo">
    <span class="logo-text">PLUCK</span>
  </div>

  <nav class="nav">
    <a href="index.html">Home</a>
    <a href="game.html">Practice</a>
    <a href="demo2.html">Pluck Arena</a>
    <a href="rules.html">Rules</a>
    <a href="learn-pluck.html">Learn Pluck</a>
    <a href="about.html">About</a>
  </nav>
</header>

<!-- ================= GAME ================= -->
<main class="table">

  <!-- HUD -->
  <div class="hud">
    <span id="trumpLabel">(not set)</span>
    <span id="booksSummary"></span>
    <span id="phaseVal"></span>
    <span id="dealerVal"></span>
    <span id="trickNum">0</span>/<span id="trickMax">17</span>
  </div>

  <!-- TRICK AREA -->
  <div class="trick-area">
    <div id="trickSlots"></div>
  </div>

  <!-- AI LEFT -->
  <div class="ai-left">
    <div id="ai2Hand"></div>
    <div id="ai2Quota">7</div>
    <div id="ai2Tricks">0</div>
  </div>

  <!-- AI RIGHT -->
  <div class="ai-right">
    <div id="ai3Hand"></div>
    <div id="ai3Quota">6</div>
    <div id="ai3Tricks">0</div>
  </div>

  <!-- PLAYER -->
  <div class="player-strip">
    <div>Romando Sr | Quota: <span id="youQuota">4</span> | Tricks: <span id="youTricks">0</span></div>
    <div>Your cards are below</div>
  </div>

  <!-- HAND -->
  <div id="youHand"></div>

</main>

<!-- ================= REQUIRED FIX BLOCK ================= -->
<!-- DO NOT REMOVE - REQUIRED BY JS -->
<div id="pluckEventPanel" style="display:none;">
  <div id="pluckEventCard">
    <div id="pluckEventTitle"></div>
    <div id="pluckEventGive"></div>
    <div id="pluckEventTake"></div>
    <div id="pluckEventImpact"></div>
  </div>
</div>

<button id="undoLastCardBtn" style="display:none;">Undo</button>

<!-- ================= JS ================= -->
<script src="js/demo2.js"></script>

</body>
</html>
