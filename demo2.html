<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Pluck Demo 2</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body class="demo2Page">
  <!-- ===== Nav (same style as demo1) ===== -->
  <header class="nav">
    <a class="brand" href="index.html">
      <img src="assets/logo.png" alt="Pluck" onerror="this.style.display='none'">
      <span>PLUCK</span>
    </a>

    <nav class="navlinks">
      <a href="game.html">Play Demo</a>
      <a class="activeLink" href="demo2.html">Demo 2</a>
      <a href="rules.html">Rules</a>
      <a href="about.html">About</a>
    </nav>
  </header>

  <!-- ===== Demo2 stage ===== -->
  <main class="demo2Stage">
    <section class="feltTable" aria-label="3-player table">
      <!-- LEFT SEAT -->
      <div class="seat seat-left">
        <div class="avatarWrap">
          <div class="avatar headArms"></div>
          <div class="seatLabel">
            <div class="seatName">AI2 (Left)</div>
            <div class="seatSub">Hidden hand</div>
          </div>
        </div>
        <div id="ai2Hand" class="aiBacks" aria-label="AI2 hidden cards"></div>
      </div>

      <!-- RIGHT SEAT -->
      <div class="seat seat-right">
        <div class="avatarWrap">
          <div class="avatar headArms"></div>
          <div class="seatLabel">
            <div class="seatName">AI3 (Right)</div>
            <div class="seatSub">Hidden hand</div>
          </div>
        </div>
        <div id="ai3Hand" class="aiBacks" aria-label="AI3 hidden cards"></div>
      </div>

      <!-- CENTER TRICK -->
      <div class="trickCenter">
        <div class="trickInner">
          <div class="trickTitle">Trick Area</div>

          <!-- game.js renders trick cards into #trick -->
          <div id="trick" class="trickSlots"></div>

          <div class="slotHint">Center play cards go here</div>
        </div>
      </div>

      <!-- BOTTOM (YOU) -->
      <div class="seat seat-bottom">
        <div class="youBar">
          <div class="avatarWrap">
            <div class="avatar headArms avatar-you"></div>
            <div class="seatLabel">
              <div class="seatName">YOU</div>
              <div class="seatSub">Your cards are in front of you</div>
            </div>
          </div>

          <button id="resetBtn" class="btn demo2Reset">Reset (New Deal)</button>
        </div>

        <!-- Message line -->
        <div id="msg" class="demo2Msg">Pick dealer to begin.</div>

        <!-- Your hand (game.js renders into #hand) -->
        <div id="hand" class="demo2Hand"></div>
      </div>

      <!-- ===== Hidden engine-required UI (kept for compatibility) ===== -->
      <div class="engineHidden" aria-hidden="true">
        <!-- pick dealer panel dependencies -->
        <button id="pickBtn">Pick</button>
        <button id="pickOkBtn">OK</button>
        <button id="pickReBtn">Re-Pick</button>
        <div id="pickStatus"></div>
        <div id="pickAI2"></div>
        <div id="pickAI3"></div>
        <div id="pickYOU"></div>

        <!-- labels game.js updates -->
        <div id="phaseLabel"></div>
        <div id="trumpLabel"></div>
        <div id="trumpOpenLabel"></div>
        <div id="turnBanner"></div>

        <div id="ai2Tricks"></div>
        <div id="ai3Tricks"></div>
        <div id="youTricks"></div>

        <div id="ai2Quota"></div>
        <div id="ai3Quota"></div>
        <div id="youQuota"></div>

        <div id="trickNum"></div>
        <div id="trickMax"></div>

        <div id="dealerLabel"></div>
        <div id="dealerBanner"></div>

        <div id="pDeal"></div>
        <div id="pPluck"></div>
        <div id="pTrump"></div>
        <div id="pPlay"></div>

        <div id="pluckPanel"></div>
        <div id="pluckStatus"></div>
        <div id="pluckChoices"></div>
        <button id="pluckNextBtn"></button>

        <div id="trumpPanel">
          <button data-trump="S"></button>
          <button data-trump="H"></button>
          <button data-trump="D"></button>
          <button data-trump="C"></button>
        </div>
        <div id="trumpStatus"></div>
        <div id="trumpAceSlot"></div>
      </div>

    </section>
  </main>

  <footer class="footer">© 2026 Pluck The Card Game</footer>

  <!-- Use the same engine as demo1 -->
  <script src="js/game.js"></script>
</body>
</html>
