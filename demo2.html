<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Pluck Demo 2</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="nav">
    <a class="brand" href="index.html">
      <img src="assets/PluckTheCardGame_Logo.jpg" alt="Pluck Logo">
      <span>PLUCK</span>
    </a>
    <nav class="navlinks">
      <a href="game.html">Play Demo</a>
      <a href="demo2.html" class="active">Demo 2</a>
      <a href="rules.html">Rules</a>
      <a href="about.html">About</a>
    </nav>
  </header>

  <main class="container">

    <!-- DEMO 2: Table-only layout (no logic yet) -->
    <section class="tableStage">

      <div class="feltTable">

        <!-- LEFT SEAT (AI2) -->
        <div class="seat seat-left">
          <div class="avatarWrap">
            <div class="avatar" aria-label="AI2"></div>
            <div class="seatLabel">
              <div class="seatName">AI2</div>
              <div class="seatSub">Hidden Hand</div>
            </div>
          </div>
        </div>

        <!-- RIGHT SEAT (AI3) -->
        <div class="seat seat-right">
          <div class="avatarWrap">
            <div class="avatar" aria-label="AI3"></div>
            <div class="seatLabel">
              <div class="seatName">AI3</div>
              <div class="seatSub">Hidden Hand</div>
            </div>
          </div>
        </div>

        <!-- CENTER TRICK AREA -->
        <div class="trickCenter">
          <div class="trickInner">
            <div class="trickTitle">Trick Area</div>

            <!-- Later, your game.js can render trick cards into this -->
            <div id="demo2Trick" class="trickSlots">
              <div class="slotHint">Center play cards go here</div>
            </div>
          </div>
        </div>

        <!-- YOU (BOTTOM SEAT) -->
        <div class="seat seat-bottom">
          <div class="youPanel">
            <div class="youTop">
              <div class="avatarWrap">
                <div class="avatar avatar-you" aria-label="YOU"></div>
                <div class="seatLabel">
                  <div class="seatName">YOU</div>
                  <div class="seatSub">Your Hand</div>
                </div>
              </div>

              <div class="youMeta">
                <span class="pill">Tap a card to play</span>
                <span class="pill pill-secondary">Must follow suit</span>
              </div>
            </div>

            <!-- Later, your game.js can render hand cards into this -->
            <div id="demo2Hand" class="handDock">
              <div class="handHint">Your cards will appear here (front of you)</div>
            </div>
          </div>
        </div>

      </div>
    </section>

  </main>

  <footer class="footer">© 2026 Pluck The Card Game</footer>

</body>
</html>
