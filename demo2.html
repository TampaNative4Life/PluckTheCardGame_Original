<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pluck Demo 2</title>
<link rel="stylesheet" href="css/style.css">

<style>
.tableWrap{
  max-width:1200px;
  margin:0 auto;
  padding:20px;
}

.feltStage{
  perspective:1200px;
  margin-top:20px;
}

.feltTable{
  position:relative;
  height:650px;
  border-radius:30px;
  background:
    radial-gradient(900px 500px at 50% 35%, rgba(255,255,255,.08), transparent 60%),
    linear-gradient(135deg, #0c5b2e, #063b1f);
  box-shadow:0 40px 90px rgba(0,0,0,.55);
  transform: rotateX(14deg);
  overflow:hidden;
}

.seat{
  position:absolute;
  padding:12px;
  border-radius:16px;
  background:rgba(0,0,0,.35);
  border:1px solid rgba(255,255,255,.15);
  color:white;
}

.seat.left{
  left:30px;
  top:50%;
  transform:translateY(-50%);
}

.seat.right{
  right:30px;
  top:50%;
  transform:translateY(-50%);
}

.seat.bottom{
  left:50%;
  bottom:30px;
  transform:translateX(-50%);
  width:600px;
}

.centerTrick{
  position:absolute;
  left:50%;
  top:45%;
  transform:translate(-50%, -50%);
  width:500px;
  height:250px;
  border-radius:20px;
  border:2px dashed rgba(255,255,255,.4);
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:18px;
}
</style>

</head>
<body>

<header class="nav">
  <a class="brand" href="index.html">
    <img src="assets/PluckTheCardGame_Logo.jpg" alt="Pluck Logo">
    <span>PLUCK</span>
  </a>
  <nav class="navlinks">
    <a href="game.html">Play Demo</a>
    <a href="demo2.html">Demo 2</a>
    <a href="rules.html">Rules</a>
    <a href="about.html">About</a>
  </nav>
</header>

<main class="tableWrap">

  <div class="feltStage">
    <div class="feltTable">

      <div class="seat left">
        <strong>AI2 (Left)</strong><br>
        Hidden Hand
      </div>

      <div class="seat right">
        <strong>AI3 (Right)</strong><br>
        Hidden Hand
      </div>

      <div class="centerTrick">
        Trick Area
      </div>

      <div class="seat bottom">
        <strong>YOU (Bottom)</strong><br>
        Your cards will render here.
      </div>

    </div>
  </div>

</main>

<footer class="footer">
© 2026 Pluck The Card Game
</footer>

</body>
</html>
