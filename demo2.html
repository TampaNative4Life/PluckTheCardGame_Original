<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pluck Demo 2</title>
  <link rel="stylesheet" href="css/style.css?v=999" />
</head>

<body class="demo2">
  <header class="nav">
    <a class="brand" href="index.html" aria-label="Pluck Home">
      <img src="assets/QS.png" alt="Pluck" />
      <span>PLUCK</span>
    </a>
    <nav class="navlinks">
      <a href="game.html">Play Demo</a>
      <a href="demo2.html" class="activeLink">Demo 2</a>
      <a href="rules.html">Rules</a>
      <a href="about.html">About</a>
    </nav>
  </header>

  <main class="container">

    <!-- TOP HUD -->
    <section class="topHud" aria-label="Game status">
      <div class="statusBar">
        <div class="statusItem">
          <span class="statusLabel">Trump</span>
          <span class="statusValue muted" id="trumpLabel">(not set)</span>
        </div>

        <div class="statusDivider" aria-hidden="true"></div>

        <div class="statusItem">
          <span class="statusLabel">Books</span>
          <span class="statusValue" id="booksSummary">YOU 0 • AI2 0 • AI3 0</span>
        </div>
      </div>
    </section>

    <!-- TABLE + RESET ABOVE IT -->
    <section class="tableStage">
      <div class="tableTopBar">
        <button class="btn" id="resetBtn">Reset (New Deal)</button>
      </div>

      <div class="feltTable" aria-label="3-player table">

        <div class="feltInset"></div>

        <!-- LEFT AI -->
        <div class="seat seat-left">
          <div class="avatarWrap">
            <div class="avatar" aria-hidden="true"></div>
            <div class="seatLabel">
              <div class="seatName">AI2 (Left)</div>
              <div class="seatSub">Hidden hand</div>
            </div>
          </div>
          <div class="aiBackRow" aria-hidden="true">
            <div class="cardBack"></div><div class="cardBack"></div><div class="cardBack"></div>
            <div class="cardBack"></div><div class="cardBack"></div>
          </div>
        </div>

        <!-- RIGHT AI -->
        <div class="seat seat-right">
          <div class="avatarWrap">
            <div class="avatar" aria-hidden="true"></div>
            <div class="seatLabel">
              <div class="seatName">AI3 (Right)</div>
              <div class="seatSub">Hidden hand</div>
            </div>
          </div>
          <div class="aiBackRow" aria-hidden="true">
            <div class="cardBack"></div><div class="cardBack"></div><div class="cardBack"></div>
            <div class="cardBack"></div><div class="cardBack"></div>
          </div>
        </div>

        <!-- CENTER TRICK -->
        <div class="trickCenter" id="trickArea">
          <div class="trickInner">
            <div class="trickTitle">Trick Area</div>
            <div class="trickSlots" id="trickSlots">
              <div class="slotHint">(empty)</div>
            </div>
            <div class="slotHint">Center play cards go here</div>
          </div>
        </div>

        <!-- YOU -->
        <div class="seat seat-bottom">
          <div class="youDock">
            <div class="youRow">
              <div class="avatarWrap">
                <div class="avatar avatar-you" aria-hidden="true"></div>
                <div class="seatLabel">
                  <div class="seatName">YOU</div>
                  <div class="seatSub">Your cards are in front of you</div>
                </div>
              </div>
            </div>

            <div class="yourHandRow" id="youHand" aria-label="Your hand"></div>
          </div>
        </div>

      </div>
    </section>

    <footer class="footer">© 2026 Pluck The Card Game</footer>
  </main>

  <!-- Engine (pure) -->
  <script src="js/engine.js?v=999"></script>

  <!-- UI (demo2) -->
  <script src="js/demo2.ui.js?v=999"></script>
</body>
</html>
