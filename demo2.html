<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pluck Demo 2</title>

  <!-- keep your existing site styles -->
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <!-- Header / Nav (match your existing look) -->
  <header class="topbar">
    <div class="brand">
      <img class="brandLogo" src="assets/logo.png" alt="Pluck" onerror="this.style.display='none'">
      <div class="brandText">PLUCK</div>
    </div>

    <nav class="topnav">
      <a href="game.html">Play Demo</a>
      <a class="active" href="demo2.html">Demo 2</a>
      <a href="docs/rules.html">Rules</a>
      <a href="about.html">About</a>
    </nav>
  </header>

  <main class="page">
    <!-- 3-seat felt table -->
    <section class="tableWrap">
      <div class="table3d">

        <!-- LEFT AI -->
        <div class="seat seatLeft">
          <div class="avatar">
            <div class="head"></div>
            <div class="label">
              <div class="name">AI2</div>
              <div class="sub">Hidden hand</div>
            </div>
          </div>

          <div class="cardFan cardFanLeft" aria-label="AI2 hidden cards">
            <!-- purely decorative backs for now -->
            <div class="cardBack"></div>
            <div class="cardBack"></div>
            <div class="cardBack"></div>
            <div class="cardBack"></div>
            <div class="cardBack"></div>
          </div>
        </div>

        <!-- RIGHT AI -->
        <div class="seat seatRight">
          <div class="avatar">
            <div class="head"></div>
            <div class="label">
              <div class="name">AI3</div>
              <div class="sub">Hidden hand</div>
            </div>
          </div>

          <div class="cardFan cardFanRight" aria-label="AI3 hidden cards">
            <div class="cardBack"></div>
            <div class="cardBack"></div>
            <div class="cardBack"></div>
            <div class="cardBack"></div>
            <div class="cardBack"></div>
          </div>
        </div>

        <!-- CENTER TRICK -->
        <div class="trickCenter">
          <div class="trickBox">
            <div class="trickTitle">Trick</div>

            <div class="trickCards">
              <div class="trickSlot">AI2 play</div>
              <div class="trickSlot">AI3 play</div>
              <div class="trickSlot">YOU play</div>
            </div>

            <div class="trickHint">Center play cards go here.</div>
          </div>
        </div>

        <!-- YOU (BOTTOM) -->
        <div class="seat seatBottom">
          <div class="youBanner">
            <div class="avatar avatarYou">
              <div class="head"></div>
              <div class="label">
                <div class="name">YOU</div>
                <div class="sub">Your hand</div>
              </div>
            </div>

            <div class="youHint">Tap a card to play. Must follow suit.</div>
          </div>

          <!-- Your visible cards (front of you) -->
          <div class="yourHandRow" id="demo2YourHand">
            <!-- placeholder cards (swap later with real cards from game.js) -->
            <div class="cardFaceMini red">A♥</div>
            <div class="cardFaceMini black">K♠</div>
            <div class="cardFaceMini red">Q♦</div>
            <div class="cardFaceMini black">J♣</div>
            <div class="cardFaceMini black">10♠</div>
            <div class="cardFaceMini red">9♥</div>
            <div class="cardFaceMini red">8♦</div>
          </div>
        </div>

      </div>
    </section>

    <footer class="footer">
      © 2026 Pluck The Card Game
    </footer>
  </main>
</body>
</html>
