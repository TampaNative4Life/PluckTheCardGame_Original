<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pluck Demo 2</title>

  <!-- keep your existing global style.css for nav + site theme -->
  <link rel="stylesheet" href="css/style.css" />

  <!-- demo2-only table styling (NEW file below) -->
  <link rel="stylesheet" href="css/demo2.css" />
</head>

<body>

  <!-- NAV (matches your site) -->
  <header class="nav">
    <a class="brand" href="index.html">
      <img src="assets/logo.png" alt="Pluck" onerror="this.style.display='none'">
      <span>PLUCK</span>
    </a>

    <nav class="navlinks">
      <a href="game.html">Play Demo</a>
      <a class="activeLink" href="demo2.html">Demo 2</a>
      <a href="rules.html">Rules</a>
      <a href="about.html">About</a>
    </nav>
  </header>

  <main class="container">
    <section class="demo2Stage">

      <div class="feltShell" aria-label="3 player table">
        <div class="feltTable">

          <!-- LEFT AI -->
          <div class="seat seatLeft">
            <div class="avatarCard">
              <div class="avatarHuman"></div>
              <div class="seatText">
                <div class="seatName">AI2 (Left)</div>
                <div class="seatSub">Hidden hand</div>
              </div>
            </div>
            <div class="aiBackFan" id="ai2Hand" aria-label="AI2 hand backs"></div>
          </div>

          <!-- RIGHT AI -->
          <div class="seat seatRight">
            <div class="avatarCard">
              <div class="avatarHuman"></div>
              <div class="seatText">
                <div class="seatName">AI3 (Right)</div>
                <div class="seatSub">Hidden hand</div>
              </div>
            </div>
            <div class="aiBackFan" id="ai3Hand" aria-label="AI3 hand backs"></div>
          </div>

          <!-- CENTER TRICK -->
          <div class="trickCenter">
            <div class="trickPanel">
              <div class="trickTitle">Trick Area</div>

              <!-- IMPORTANT: engine renders trick into #trick -->
              <div id="trick" class="trickSlots" aria-label="Trick cards"></div>

              <div class="trickHint">Center play cards go here</div>
            </div>
          </div>

          <!-- YOU (BOTTOM / CENTER) -->
          <div class="seat seatBottom">
            <div class="youHeader">
              <div class="avatarCard avatarYouCard">
                <div class="avatarHuman avatarYou"></div>
                <div class="seatText">
                  <div class="seatName">YOU</div>
                  <div class="seatSub">Your cards are in front of you</div>
                </div>
              </div>

              <button id="resetBtn" class="btn demo2Reset">Reset (New Deal)</button>
            </div>

            <!-- IMPORTANT: engine renders your full 17-card hand into #hand -->
            <div id="hand" class="yourHandDock" aria-label="Your hand"></div>

            <!-- message line used by engine -->
            <div id="msg" class="demo2Msg"></div>
          </div>

        </div>
      </div>

      <!-- hidden engine-required labels (so Demo 1 engine doesn’t crash) -->
      <div class="engineHidden">
        <span id="phaseLabel"></span>
        <span id="trumpLabel"></span>
        <span id="trumpOpenLabel"></span>
        <span id="turnBanner"></span>

        <span id="ai2Tricks"></span>
        <span id="ai3Tricks"></span>
        <span id="youTricks"></span>

        <span id="ai2Quota"></span>
        <span id="ai3Quota"></span>
        <span id="youQuota"></span>

        <span id="trickNum"></span>
        <span id="trickMax"></span>

        <span id="dealerLabel"></span>
        <span id="dealerBanner"></span>

        <span id="pDeal"></span>
        <span id="pPluck"></span>
        <span id="pTrump"></span>
        <span id="pPlay"></span>

        <div id="pluckPanel"></div>
        <div id="pluckStatus"></div>
        <div id="pluckChoices"></div>
        <button id="pluckNextBtn"></button>

        <div id="trumpPanel">
          <!-- these exist only so engine doesn’t error;
               dealer trump pick UI can be added later as real buttons -->
          <button data-trump="S"></button>
          <button data-trump="H"></button>
          <button data-trump="D"></button>
          <button data-trump="C"></button>
          <div id="trumpStatus"></div>
        </div>

        <!-- Initial pick UI placeholders -->
        <button id="pickBtn"></button>
        <button id="pickOkBtn"></button>
        <button id="pickReBtn"></button>
        <div id="pickStatus"></div>
        <div id="pickAI2"></div>
        <div id="pickAI3"></div>
        <div id="pickYOU"></div>

        <div id="trumpAceSlot"></div>
      </div>

    </section>
  </main>

  <footer class="footer">© 2026 Pluck The Card Game</footer>

  <!-- IMPORTANT: demo2 uses its own engine copy (next file) -->
  <script src="js/game2.js"></script>
</body>
</html>
